<nav>
  <ul class="container">
    <li *ngFor="let section of sections" [ngClass]="{'active': section.active }" (click)="getNavigator(section)">
      <img [src]="section.icon" [alt]="section.icon">
      <p>{{ section.title }}</p>
      <img *ngIf="!section.active" src="/assets/arrow_down.png" alt="arrow-down-icon">
      <img *ngIf="section.active" src="/assets/arrow_down_active.png" alt="arrow-down-icon">
    </li>
  </ul>
</nav>
